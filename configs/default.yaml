governance:
  # 当前只读取业务文件，禁止删除、移动、重命名或覆盖原文件。
  read_only: true

  # 默认递归扫描输入目录。
  recursive: true

  # 当前支持的文档格式；扫描版 PDF 暂不执行 OCR。
  allowed_extensions:
    - .xlsx
    - .docx
    - .pdf

  # 防止一次运行扫描过多文件并产生过大的比较矩阵。
  max_files: 500

prompt:
  # 0.2.3 已接入顶层加载节点；默认关闭时节点以兼容模式直接通过。
  enabled: false

  # System Prompt 的语义版本和仓库内受控资源路径。
  version: file-governance-v1
  source_path: resources/prompts/file_governance_system_v1.md

  # 仅允许追加简短、结构化的运行规则，不在配置中保存业务正文。
  dynamic_rules: []

hooks:
  # 0.6.0 可在 after_run 把脱敏 Python Tool 审计写入应用数据库；默认仍关闭。
  enabled: false

  # 列表顺序就是各生命周期阶段的预期执行顺序。
  before_run:
    - validate_request_envelope_hook
    - enrich_run_state_hook
    - initialize_tool_audit_hook
  before_model: []
  after_model: []
  after_run:
    - validate_report_result_hook
    - flush_tool_audit_hook
    - cleanup_run_resources_hook

  # 未单独声明时阻断运行；审计和清理失败只记录事件并允许治理结果保留。
  default_failure_policy: block
  failure_policies:
    initialize_tool_audit_hook: ignore
    flush_tool_audit_hook: ignore
    cleanup_run_resources_hook: ignore

llm:
  # 0.5.2 继续默认关闭真实模型；三个业务阶段分派时强制使用 Mock 且不访问网络。
  enabled: false

  # 这是兼容旧请求的单模型写法，运行时会规范化为 ID 为 default 的单一 Profile。
  provider: mock

  # 模型名称只保存在配置和审计中，不在业务节点中硬编码。
  model: mock-structured-v1

  # Mock 不使用密钥；多模型写法和任务路由参见 examples/sample_llm_request.json。
  api_key_env: null

  # Mock 不使用自定义端点；真实 Provider 可只保存对应 Base URL 的环境变量名称。
  base_url_env: null

  # Provider 专有参数必须通过 JSON 环境变量注入，默认不读取任何扩展参数。
  options_env: null

  # auto 让各 LangChain Provider 选择默认结构化输出实现。
  structured_output_method: auto

  # 文件版本治理摘要默认使用低温度，减少同一输入下的输出漂移。
  temperature: 0.0

  # 单次 Pydantic 结构化响应允许使用的最大输出 Token 数。
  max_output_tokens: 800

  # 单次 Provider 调用超时时间，单位为秒。
  timeout_seconds: 30.0

  # 模型失败时允许后续 Agent 批次使用确定性逻辑继续。
  fallback_enabled: true

grouping:
  # 文件名、内容与关键字段综合相似度达到该值时归入同一版本组。
  similarity_threshold: 0.72

recommendation:
  # 置信度低于该值，或检测到分叉时，必须进入人工确认。
  auto_select_threshold: 0.82

  # 存在可编辑版本时优先推荐可编辑格式，而不是 PDF 导出件。
  editable_extensions:
    - .xlsx
    - .docx

evidence:
  # PDF 与可编辑源版本的综合分数达到该值时才允许建立来源关系。
  pdf_match_threshold: 0.82

  # 默认不读取发送记录；请求可显式传入只读 JSON 文件路径。
  delivery_log_path: null

  # 本地发送记录最大读取大小，单位为字节，默认 10 MiB。
  max_delivery_log_bytes: 10485760

  # 近似并列的 PDF 来源候选必须至少达到该分差才允许自动匹配。
  minimum_pdf_match_margin: 0.05

parsing:
  # 单文件读取上限，单位为字节，默认 100 MiB。
  max_file_size_bytes: 104857600

  # ZIP 容器格式解压后的总大小上限，防止压缩炸弹。
  max_uncompressed_size_bytes: 524288000

  # 单个文档允许提取的最大字符数。
  max_extracted_characters: 5000000

  # Excel 单文件最多遍历的单元格数。
  max_excel_cells: 200000

  # PDF 单文件最多读取的页数。
  max_pdf_pages: 500

artifacts:
  # 标准化内容和中间产物根目录，不得指向或包含输入目录。
  root: .artifacts/content

  # 标准化内容由 storage 层写入该根目录下的 normalized 子目录。
  normalized_subdirectory: normalized

  # 可选调试或后续处理产物写入该根目录下的 intermediate 子目录。
  intermediate_subdirectory: intermediate

  # Markdown 治理报告目录，同样不得与输入目录重叠。
  reports: .artifacts/reports

checkpoints:
  # CLI 默认使用 SQLite，以便关闭进程后仍能恢复人工审核。
  backend: sqlite

  # checkpoint 数据库必须位于只读输入目录之外。
  database_path: .artifacts/checkpoints/file-governance.sqlite3

memory:
  # 0.5.4 默认关闭；显式启用后才会召回和持久化跨运行治理事实。
  enabled: false

  # null 时由输入根目录计算不可逆哈希；显式种子同样只保存哈希结果。
  namespace: null

  # 长期 Memory 使用独立应用数据库，严禁与 checkpoint 共用 SQLite 文件。
  database_path: .artifacts/database/file-governance-app.sqlite3

  # 每次新运行最多读取的最近长期 Memory 条目数量。
  recall_limit: 50

context_compact:
  # 0.6.0 继续默认关闭；显式启用后在 Inventory 和 Evidence 安全点估算上下文。
  enabled: false

  # 估算上下文超过该 Token 数且存在可回收字段时才执行压缩。
  trigger_token_threshold: 12000

  # Evidence 完成后不在图状态保留正文预览，完整内容继续由 content_ref 重建。
  retained_preview_characters: 0

  # 有界摘要默认写入应用数据库；文档详情只写入 intermediate 产物。
  persist_summaries: true

  # 与长期 Memory 共用应用数据库，但仍严禁与 checkpoint 共用 SQLite 文件。
  database_path: .artifacts/database/file-governance-app.sqlite3

application_database:
  # 默认关闭以兼容 0.5.0；Memory 或 Context Summary 启用时会自动接通同一数据库。
  enabled: false

  # 七张应用表保存运行、Memory、摘要、审计、人工选择、错误恢复和节点执行事实。
  backend: sqlite

  # 应用数据库与 LangGraph checkpoint 使用不同目录和不同 SQLite 文件。
  database_path: .artifacts/database/file-governance-app.sqlite3

  # 创建 Engine 或执行在线迁移时自动创建数据库文件的父目录。
  auto_create_parent: true

  # 默认不输出 SQL，防止日志意外包含结构化业务字段。
  echo: false

  # SQLite 遇到短暂文件锁时最多等待的秒数。
  timeout_seconds: 30.0

recovery:
  # 0.7.0 已完成故障注入、恢复重放与兼容验收；关闭时保留兼容失败语义。
  enabled: true

  # 未单独配置错误类别时使用保守策略：不自动重试、不静默降级、允许人工处理。
  default_policy:
    retryable: false
    max_retries: 0
    initial_backoff_seconds: 0.5
    backoff_multiplier: 2.0
    max_backoff_seconds: 8.0
    fallback: null
    requires_human: true

  # 类别配置只覆盖默认策略中的差异字段，加载后会形成完整、可 checkpoint 的策略快照。
  categories:
    filesystem:
      retryable: true
      max_retries: 1

    parse:
      fallback: skip_file
      requires_human: false

    comparison:
      fallback: partial_result
      requires_human: true

    evidence:
      retryable: true
      max_retries: 1
      fallback: partial_result
      requires_human: false

    llm:
      retryable: true
      max_retries: 1
      fallback: coordinator
      requires_human: false

    protocol:
      fallback: coordinator
      requires_human: true

    memory:
      retryable: true
      max_retries: 1
      fallback: no_memory
      requires_human: false

    skill:
      retryable: true
      max_retries: 1
      fallback: default_skill
      requires_human: false

    context:
      fallback: keep_context
      requires_human: false

    database:
      retryable: true
      max_retries: 2
      initial_backoff_seconds: 1.0
      max_backoff_seconds: 10.0

    checkpoint:
      retryable: true
      max_retries: 1
      initial_backoff_seconds: 1.0

    timeout:
      retryable: true
      max_retries: 2
      initial_backoff_seconds: 1.0
      max_backoff_seconds: 10.0
