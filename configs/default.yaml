governance:
  # 当前只读取业务文件，禁止删除、移动、重命名或覆盖原文件。
  read_only: true

  # 默认递归扫描输入目录。
  recursive: true

  # 当前支持的文档格式；扫描版 PDF 暂不执行 OCR。
  allowed_extensions:
    - .xlsx
    - .docx
    - .pdf

  # 防止一次运行扫描过多文件并产生过大的比较矩阵。
  max_files: 500

prompt:
  # 0.2.3 已接入顶层加载节点；默认关闭时节点以兼容模式直接通过。
  enabled: false

  # System Prompt 的语义版本和仓库内受控资源路径。
  version: file-governance-v1
  source_path: resources/prompts/file_governance_system_v1.md

  # 仅允许追加简短、结构化的运行规则，不在配置中保存业务正文。
  dynamic_rules: []

hooks:
  # 0.2.3 已接入顶层前后置节点；默认关闭时仅记录配置中已声明 Hook 的跳过事件。
  enabled: false

  # 列表顺序就是各生命周期阶段的预期执行顺序。
  before_run:
    - validate_request_envelope_hook
    - enrich_run_state_hook
    - initialize_tool_audit_hook
  before_model: []
  after_model: []
  after_run:
    - validate_report_result_hook
    - flush_tool_audit_hook
    - cleanup_run_resources_hook

  # 未单独声明时阻断运行；审计和清理失败只记录事件并允许治理结果保留。
  default_failure_policy: block
  failure_policies:
    initialize_tool_audit_hook: ignore
    flush_tool_audit_hook: ignore
    cleanup_run_resources_hook: ignore

llm:
  # 0.5.0 默认关闭真实模型；三个业务阶段分派时强制使用 Mock 且不访问网络。
  enabled: false

  # 首批支持 mock 和 openai；启用真实模型时改为 openai。
  provider: mock

  # 模型名称只保存在配置和审计中，不在业务节点中硬编码。
  model: mock-structured-v1

  # Mock Provider 不使用密钥；OpenAI Provider 应设置为 OPENAI_API_KEY 等环境变量名。
  api_key_env: null

  # 文件版本治理摘要默认使用低温度，减少同一输入下的输出漂移。
  temperature: 0.0

  # 单次 Pydantic 结构化响应允许使用的最大输出 Token 数。
  max_output_tokens: 800

  # 单次 Provider 调用超时时间，单位为秒。
  timeout_seconds: 30.0

  # 模型失败时允许后续 Agent 批次使用确定性逻辑继续。
  fallback_enabled: true

grouping:
  # 文件名、内容与关键字段综合相似度达到该值时归入同一版本组。
  similarity_threshold: 0.72

recommendation:
  # 置信度低于该值，或检测到分叉时，必须进入人工确认。
  auto_select_threshold: 0.82

  # 存在可编辑版本时优先推荐可编辑格式，而不是 PDF 导出件。
  editable_extensions:
    - .xlsx
    - .docx

evidence:
  # PDF 与可编辑源版本的综合分数达到该值时才允许建立来源关系。
  pdf_match_threshold: 0.82

  # 默认不读取发送记录；请求可显式传入只读 JSON 文件路径。
  delivery_log_path: null

  # 本地发送记录最大读取大小，单位为字节，默认 10 MiB。
  max_delivery_log_bytes: 10485760

  # 近似并列的 PDF 来源候选必须至少达到该分差才允许自动匹配。
  minimum_pdf_match_margin: 0.05

parsing:
  # 单文件读取上限，单位为字节，默认 100 MiB。
  max_file_size_bytes: 104857600

  # ZIP 容器格式解压后的总大小上限，防止压缩炸弹。
  max_uncompressed_size_bytes: 524288000

  # 单个文档允许提取的最大字符数。
  max_extracted_characters: 5000000

  # Excel 单文件最多遍历的单元格数。
  max_excel_cells: 200000

  # PDF 单文件最多读取的页数。
  max_pdf_pages: 500

artifacts:
  # 标准化内容和中间产物根目录，不得指向或包含输入目录。
  root: .artifacts/content

  # 标准化内容由 storage 层写入该根目录下的 normalized 子目录。
  normalized_subdirectory: normalized

  # 可选调试或后续处理产物写入该根目录下的 intermediate 子目录。
  intermediate_subdirectory: intermediate

  # Markdown 治理报告目录，同样不得与输入目录重叠。
  reports: .artifacts/reports

checkpoints:
  # CLI 默认使用 SQLite，以便关闭进程后仍能恢复人工审核。
  backend: sqlite

  # checkpoint 数据库必须位于只读输入目录之外。
  database_path: .artifacts/checkpoints/file-governance.sqlite3

application_database:
  # 0.5.1 只建立 SQLAlchemy、Repository 和迁移骨架，暂不接入顶层治理图。
  backend: sqlite

  # 应用数据库与 LangGraph checkpoint 使用不同目录和不同 SQLite 文件。
  database_path: .artifacts/database/file-governance-app.sqlite3

  # 创建 Engine 或执行在线迁移时自动创建数据库文件的父目录。
  auto_create_parent: true

  # 默认不输出 SQL，防止日志意外包含结构化业务字段。
  echo: false

  # SQLite 遇到短暂文件锁时最多等待的秒数。
  timeout_seconds: 30.0
